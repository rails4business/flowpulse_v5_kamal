default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  host: <%= ENV.fetch("DB_HOST", "localhost") %>
  port: <%= ENV.fetch("DB_PORT", 5432) %>
  database: <%= ENV.fetch("DB_NAME", "flowpulse_v_5_development") %>
  username: <%= ENV.fetch("DB_USERNAME", nil) %>
  password: <%= ENV.fetch("POSTGRES_PASSWORD", nil) %>

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  host: <%= ENV.fetch("DB_HOST", "localhost") %>
  port: <%= ENV.fetch("DB_PORT", 5432) %>
  database: <%= ENV.fetch("DB_NAME_TEST", "flowpulse_v_5_test") %>
  username: <%= ENV.fetch("DB_USERNAME", nil) %>
  password: <%= ENV.fetch("POSTGRES_PASSWORD", nil) %>

production_default: &production_default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV["DB_HOST"] %>
  port: <%= ENV.fetch("DB_PORT", 5432) %>
  database: <%= ENV["DB_NAME"] || "flowpulse_v_5_production" %>
  username: <%= ENV["DB_USERNAME"] %>
  password: <%= ENV["POSTGRES_PASSWORD"] %>

production:
  primary:
    <<: *production_default
  cache:
    <<: *production_default
    database: <%= "#{ENV["DB_NAME"] || "flowpulse_v_5_production"}_cache" %>
    migrations_paths: db/cache_migrate
  queue:
    <<: *production_default
    database: <%= "#{ENV["DB_NAME"] || "flowpulse_v_5_production"}_queue" %>
    migrations_paths: db/queue_migrate
  cable:
    <<: *production_default
    database: <%= "#{ENV["DB_NAME"] || "flowpulse_v_5_production"}_cable" %>
    migrations_paths: db/cable_migrate
