    element: "Metallo"
    label: "Regolazione"
    short_label: "Regolazione"
    title: "Fisiologia e regolazione"
    meaning: "Ordine, ritmo, selezione, risposta"
    description: "Area dedicata alla conoscenza della fisiologia, ai ritmi corporei, alla regolazione dei sistemi, alla selezione e all’eliminazione, utilizzando quando appropriato piante officinali, fitoterapia e altri strumenti."
