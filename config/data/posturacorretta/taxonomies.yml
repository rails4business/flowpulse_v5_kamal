    description: "Area dedicata al riposo, al recupero profondo, alla terapia, ai trattamenti manuali, all’autotrattamento e alla ricostruzione delle energie disponibili."
    imperative: "Recupera"
    action: "Fermarsi, trattare, recuperare, rigenerare"
    color: "acqua"
    classes: "border-violet-700 bg-violet-600 text-white"
