center:
  key: "postura"
  label: "Postura"
  short_label: "Postura"
  title: "Postura e metodiche posturali"
  meaning: "Il punto da cui osservare il corpo"
  description: "Partiamo dalla postura per osservare il corpo e mettere in relazione recupero, movimento, ascolto, nutrimento e regolazione. Le metodiche posturali ci offrono mappe e strumenti diversi per comprenderla e accompagnarne il cambiamento."
  imperative: "Osservati"
  action: "Osservare, collegare, valutare, accompagnare"
  color: "postura"
  classes: "border-blue-200 bg-blue-50 text-blue-700"

areas:
