paths:
  cura:
    color: "red"
    kicker: "Stop al Dolore · Cura e Riabilitazione"
    title: "Dal dolore alla cura guidata."
    description: "Per chi parte da dolore, sintomi, diagnosi, patologia o fase acuta. Il primo obiettivo è mettere ordine e capire quale aiuto serve davvero."
    stepsTitle: "Parti da ciò che senti adesso."
    steps:
      - label: "Diario della salute"
        title: "Cosa sta succedendo?"
        description: "Registra dolore, eventi, trattamenti, diagnosi, attività e segnali del corpo."
        tags: ["Diario", "Sintomi", "Eventi"]
      - label: "Stop al Dolore"
        title: "Hai già una diagnosi e un piano per uscire dalla fase acuta?"
        description: "Ti aiutiamo a orientarti e a trovare il professionista che possa accompagnarti in questa fase delicata."
        tags: ["Dolore", "Professionisti", "Linee guida"]
      - label: "Primo aiuto per il dolore"
        title: "È possibile diminuire il dolore in sicurezza?"
        description: "Suggerimenti pratici e video con posizioni, movimenti ed esercizi delicati da utilizzare quando sono indicati. In presenza di segnali d’allarme, trauma importante o peggioramento, interrompi la pratica e rivolgiti a un professionista sanitario."
        tags: ["Suggerimenti", "Video", "Esercizi"]
      - label: "Valutazione Postura e Fisiologia"
        title: "Quali sistemi sono in difficoltà?"
        description: "Una valutazione per osservare articolazioni, compensi, respirazione, recupero e abitudini."
        tags: ["Valutazione", "Schede", "Percorso"]
      - label: "Percorso terapeutico per la cura della patologia"
        title: "Come creare un percorso terapeutico?"
        description: "Un piano guidato con i professionisti della salute per trattare le cause del dolore, curare la patologia e recuperare mobilità fisiologica."
        tags: ["Pianificazione", "Appuntamenti", "Professionisti"]
        appointments:
          - name: "Incontro 1: Valutazione posturale clinica"
            prof: "Fisioterapista / Osteopata"
            desc: "Analisi dei recettori, dei compensi e dei punti di sofferenza per tracciare il piano iniziale."
          - name: "Incontro 2: Trattamento e rilascio"
            prof: "Professionista sanitario"
            desc: "Seduta mirata per decongestionare le catene in tensione e ridurre il dolore acuto."
          - name: "Incontro 3: Rieducazione posturale"
            prof: "Insegnante qualificato"
            desc: "Esercizi attivi personalizzati per ristabilire equilibrio e prevenire ricadute."
          - name: "Incontro 4: Follow-up e autonomia"
            prof: "Team del percorso"
            desc: "Verifica dei risultati e impostazione della pratica da svolgere in autonomia."

  prevenzione:
    color: "orange"
    kicker: "Prevenzione"
    title: "Previeni i problemi legati alla tua attività."
    description: "Per chi vuole prevenire difficoltà legate a lavoro, sport, età, postura quotidiana o fasi specifiche della vita."
    stepsTitle: "Costruisci una prevenzione concreta."
    steps:
      - label: "Osserva"
        title: "Conosci i rischi della tua attività principale?"
        description: "Riconosci carichi, abitudini e segnali precoci prima che diventino un problema."
        tags: ["Checklist", "Lavoro", "Sport"]
      - label: "Organizza"
        title: "Quale routine puoi sostenere?"
        description: "Trasforma mobilità, recupero e ascolto corporeo in appuntamenti semplici e ripetibili."
        tags: ["Routine", "Mobilità", "Recupero"]
      - label: "Verifica"
        title: "La prevenzione sta funzionando?"
        description: "Controlla periodicamente i segnali del corpo e adatta il programma alle nuove esigenze."
        tags: ["Controlli", "Progressi", "Adattamento"]

  performance:
    color: "amber"
    kicker: "Performance"
    title: "Migliora il modo in cui lavori, studi e usi il corpo."
    description: "Per chi vuole migliorare prestazioni, energia, capacità cognitive, organizzazione e rapporto con gli strumenti digitali."
    stepsTitle: "Allena le risorse che sostengono la prestazione."
    steps:
      - label: "Fondamenta"
        title: "Hai energia sufficiente per ciò che vuoi fare?"
        description: "Parti da sonno, recupero, respirazione, movimento e qualità dell'attenzione."
        tags: ["Energia", "Recupero", "Attenzione"]
      - label: "Metodo"
        title: "Come organizzi lavoro e studio?"
        description: "Costruisci ritmi, strumenti e ambienti che riducano dispersione e sovraccarico."
        tags: ["Lavoro", "Studio", "IA"]
      - label: "Sviluppo"
        title: "Quale capacità vuoi migliorare?"
        description: "Definisci una pratica progressiva e misura ciò che cambia nella vita reale."
        tags: ["Obiettivi", "Pratica", "Verifica"]

  fisiologia:
    color: "blue"
    kicker: "Postura e Fisiologia"
    title: "Capire il corpo per prendersene cura."
    description: "Per chi vuole conoscere e riattivare articolazioni, muscoli, respiro, recupero, sistema nervoso, bioritmi e postura."
    stepsTitle: "Impara una cosa alla volta."
    steps:
      - label: "Informati"
        title: "Vuoi capire come funziona il corpo?"
        description: "Colleghiamo postura, movimento, respiro, recupero e segnali quotidiani."
        tags: ["Fisiologia", "Sistemi", "Lezioni"]
      - label: "Valutazione Postura e Fisiologia"
        title: "Quali sistemi sono in difficoltà?"
        description: "Puoi entrare nel percorso anche da qui: osserviamo articolazioni, compensi, respirazione, recupero e abitudini per definire da dove iniziare."
        tags: ["Valutazione", "Schede", "Percorso"]
      - label: "Pratica"
        title: "Vuoi iniziare con una pratica semplice?"
        description: "Mobilità articolare, punti di tensione, via di discesa, recettori e routine quotidiana."
        tags: ["Mobilità", "Autotrattamento", "Routine"]
        modules:
          - - "Modulo 01"
            - "Igiene Posturale"
            - ["Mobilità articolare", "Punti di tensione", "Vie di discesa", "Recettori sensoriali"]
          - - "Modulo 02"
            - "Principi di fisioterapia"
            - []
          - - "Modulo 03"
            - "Biomeccanica comportamentale"
            - ["Introduzione al Metodo GDS"]
          - - "Modulo 04"
            - "Principi di osteopatia"
            - []
          - - "Modulo 05"
            - "Bioritmi circadiani"
            - ["Introduzione al metodo Corpo e Coscienza"]
      - label: "Insegna"
        title: "Vuoi accompagnare altre persone?"
        description: "Accedi allo spazio degli insegnanti, al tirocinio e agli strumenti per proporre i moduli."
        tags: ["Insegnanti", "Tirocinio", "Didattica"]

  benessere:
    color: "emerald"
    kicker: "Benessere Integrato"
    title: "Costruisci un programma per stare meglio."
    description: "Per chi vuole migliorare salute, energia, abitudini e qualità della vita mettendo in relazione le diverse aree del benessere."
    stepsTitle: "Metti ordine nella tua salute."
    steps:
      - label: "Diario della salute"
        title: "Stai già facendo qualcosa per la tua salute?"
        description: "Registra attività, trattamenti, alimentazione, sonno, movimento e progressi."
        tags: ["Diario", "Abitudini", "Progressi"]
      - label: "Stato di salute"
        title: "Quali ambiti stai trascurando?"
        description: "Osserva recupero e autotrattamenti, movimento, emozioni, piante e rimedi, nutrizione."
        tags: ["5 aree", "Prevenzione", "Stile di vita"]
      - label: "Programma integrato"
        title: "Da dove vuoi partire?"
        description: "Costruisci un programma sostenibile con pratiche, professionisti e obiettivi progressivi."
        tags: ["Programma", "Professionisti", "Routine"]

  ambiente:
    color: "violet"
    kicker: "Il Giardino del Corpo · Corpo e ambiente"
    title: "Il corpo vive dentro un ambiente."
    description: "Esplora il rapporto tra corpo, natura, territorio, stagioni, tradizioni, cultura, abitudini e stile di vita."
    stepsTitle: "Ritrova un rapporto vivo con il territorio."
    steps:
      - label: "Osserva"
        title: "In quale ambiente vive il tuo corpo?"
        description: "Leggi spazi, ritmi, stagioni e abitudini che sostengono o consumano la tua energia."
        tags: ["Ambiente", "Stagioni", "Ritmi"]
      - label: "Partecipa"
        title: "Quale esperienza vuoi vivere?"
        description: "Camminate, laboratori, calendario agricolo, pratiche in natura e tradizioni locali."
        tags: ["Natura", "Territorio", "Esperienze"]
      - label: "Coltiva"
        title: "Cosa vuoi riportare nella quotidianità?"
        description: "Trasforma l'esperienza in una relazione più consapevole con luoghi, risorse e comunità."
        tags: ["Sovranità", "Comunità", "Continuità"]

  potenziale:
    color: "violet"
    kicker: "Il Giardino del Corpo · Potenziale umano"
    title: "Scopri e coltiva le tue potenzialità."
    description: "Esplora corpo, emozioni, relazioni, creatività, espressione, capacità cognitive e crescita armonica."
    stepsTitle: "Dai spazio a ciò che può crescere."
    steps:
      - label: "Ascolta"
        title: "Quali possibilità chiedono spazio?"
        description: "Riconosci desideri, inclinazioni, limiti e risorse senza separarli dal corpo."
        tags: ["Desideri", "Corpo", "Consapevolezza"]
      - label: "Esplora"
        title: "In quale linguaggio ti esprimi meglio?"
        description: "Musica, arte, gioco, lettura, teatro, movimento, memoria e pensiero creativo."
        tags: ["Creatività", "Espressione", "Cognizione"]
      - label: "Realizza"
        title: "Come trasformi un'intuizione in un progetto?"
        description: "Collega pratica personale, incontri, progetti e contributo alla comunità."
        tags: ["Progetti", "Relazioni", "Crescita"]

