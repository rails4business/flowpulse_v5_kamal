    let selectedPath = [];

    const els = {
      title: document.getElementById("current-title"),
      description: document.getElementById("current-description"),
      breadcrumb: document.getElementById("breadcrumb"),
      options: document.getElementById("options"),
      result: document.getElementById("result"),
      params: document.getElementById("params-preview"),
      search: document.getElementById("search-input")
    };

    function getColor(node) {
      return colorClasses[node?.color] || colorClasses.slate;
    }

    function getInitials(text) {
      return String(text || "?")
        .split(" ")
        .filter(Boolean)
        .slice(0, 2)
        .map(word => word[0])
        .join("")
        .toUpperCase();
    }

    function renderIcon(node, size = "h-11 w-11") {
      const color = getColor(node);

      if (node.icon_url) {
        return `
          <div class="${size} shrink-0 overflow-hidden rounded-2xl border bg-white shadow-sm ${color.icon}">
            <img src="${node.icon_url}" alt="${node.title || "Icona"}" class="h-full w-full object-cover" />
          </div>
        `;
      }

      return `
        <div class="${size} flex shrink-0 items-center justify-center rounded-2xl border text-xs font-black shadow-sm ${color.icon}">
          ${getInitials(node.title)}
        </div>
      `;
    }

    function findChildById(node, id) {
      return (node.children || []).find(child => child.id === id);
    }

    function getNodeFromPath(path) {
      let node = tree;
      const nodes = [tree];

      for (const id of path) {
        const next = findChildById(node, id);
        if (!next) break;
        node = next;
        nodes.push(node);
      }

      return { node, nodes };
    }

    function readPathFromUrl() {
      const params = new URLSearchParams(window.location.search);
      const path = params.get("path");
      return path ? path.split(".").filter(Boolean) : [];
    }

    function writePathToUrl(path) {
      const url = new URL(window.location.href);
      if (path.length) url.searchParams.set("path", path.join("."));
      else url.searchParams.delete("path");
      window.history.pushState({}, "", url);
    }

    function render() {
      const { node, nodes } = getNodeFromPath(selectedPath);
      const children = node.children || [];
      const isFinal = children.length === 0;

      els.title.textContent = node.question || node.title;
      els.description.textContent = node.description || "";
      els.params.textContent = selectedPath.length ? `?path=${selectedPath.join(".")}` : "nessun params";
      els.search.value = "";

      renderBreadcrumb(nodes);
      els.options.innerHTML = "";
      els.result.innerHTML = "";
      els.result.classList.add("hidden");

      if (isFinal) renderFinalNode(node);
      else renderOptions(children);
    }

    function renderBreadcrumb(nodes) {
      els.breadcrumb.innerHTML = "";

      nodes.forEach((node, index) => {
        const li = document.createElement("li");
        li.className = "flex items-center gap-2";

        const button = document.createElement("button");
        button.type = "button";
        button.textContent = index === 0 ? "Inizio" : node.title;
        button.className = index === nodes.length - 1
          ? "font-bold text-slate-950"
          : "hover:text-slate-950";

        button.addEventListener("click", () => {
          selectedPath = selectedPath.slice(0, Math.max(0, index));
          writePathToUrl(selectedPath);
          render();
        });

        li.appendChild(button);

        if (index < nodes.length - 1) {
          const sep = document.createElement("span");
          sep.textContent = "/";
          sep.className = "text-slate-300";
          li.appendChild(sep);
        }

        els.breadcrumb.appendChild(li);
      });
    }

    function renderOptions(children) {
      children.forEach(child => {
        const color = getColor(child);
        const button = document.createElement("button");
        button.type = "button";
        button.dataset.search = `${child.title} ${child.description || ""} ${child.brand || ""} ${child.type || ""}`.toLowerCase();
        button.className = `option-card rounded-3xl border px-5 py-4 text-left shadow-sm transition hover:shadow-md ${color.card}`;

        button.innerHTML = `
          <div class="flex items-center justify-between gap-4">
            <div class="flex min-w-0 items-center gap-4">
              ${renderIcon(child)}
              <div class="min-w-0">
                <div class="mb-2 flex flex-wrap items-center gap-2">
                                   ${child.type ? `<span class="rounded-full bg-white/70 px-3 py-1 text-[10px] font-black uppercase tracking-[0.16em] text-slate-500">${child.type}</span>` : ""}
                </div>
                <h3 class="text-base font-black ${color.title}">${child.title}</h3>
                <p class="mt-1 text-sm leading-6 text-slate-600">${child.description || ""}</p>
              </div>
            </div>
            <span class="shrink-0 text-xl text-slate-400">→</span>
          </div>
        `;

        button.addEventListener("click", () => {
          selectedPath.push(child.id);
          writePathToUrl(selectedPath);
          render();
        });

        els.options.appendChild(button);
      });
    }

    function renderFinalNode(node) {
      const color = getColor(node);
      els.result.classList.remove("hidden");

      els.result.innerHTML = `
        <div class="rounded-3xl border p-6 text-center shadow-sm ${color.soft}">
          <div class="mx-auto flex justify-center">
            ${renderIcon(node, "h-16 w-16")}
          </div>

          <p class="mt-5 text-xs font-black uppercase tracking-[0.2em] ${color.text}">Risultato</p>
          <h3 class="mt-3 text-3xl font-black ${color.title}">${node.title}</h3>
          <p class="mx-auto mt-4 max-w-xl text-base leading-7 text-slate-600">${node.description || ""}</p>

          <div class="mx-auto mt-5 grid max-w-xl gap-2 rounded-3xl bg-white/75 p-4 text-sm text-slate-600">
            ${node.brand ? `<div><span class="font-bold">Brand:</span> ${node.brand}</div>` : ""}
            ${node.type ? `<div><span class="font-bold">Tipo:</span> ${node.type}</div>` : ""}
            <div>
              <span class="font-bold">Service ID:</span>
              <code class="rounded bg-slate-100 px-2 py-1">${node.service_id || node.id}</code>
            </div>
            <div>
              <span class="font-bold">Params:</span>
              <code class="rounded bg-slate-100 px-2 py-1">path=${selectedPath.join(".")}</code>
            </div>
          </div>

          <div class="mt-6 flex flex-wrap justify-center gap-3">
            <a href="${node.href || "#"}" class="rounded-full px-6 py-3 text-sm font-black ${color.button}">
              ${node.cta_label || "Inizia ora"}
            </a>
            <button type="button" id="back-one" class="rounded-full border border-slate-300 bg-white px-6 py-3 text-sm font-black text-slate-700 hover:bg-slate-100">
              Indietro
            </button>
          </div>
        </div>
      `;

      document.getElementById("back-one").addEventListener("click", () => {
        selectedPath.pop();
        writePathToUrl(selectedPath);
        render();
      });
    }

    els.search.addEventListener("input", () => {
      const query = els.search.value.trim().toLowerCase();
      document.querySelectorAll(".option-card").forEach(card => {
        card.classList.toggle("hidden", query && !card.dataset.search.includes(query));
      });
    });

    window.addEventListener("popstate", () => {
      selectedPath = readPathFromUrl();
      render();
    });

    selectedPath = readPathFromUrl();
    render();
  </script>

</body>

</html>
