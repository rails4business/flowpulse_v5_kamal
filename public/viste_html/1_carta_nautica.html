<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Carta Nautica - Flowpulse</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Inter', sans-serif; background-color: #000814; color: #fff; overflow: hidden; }
  .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
  
  svg { width: 100vw; height: calc(100vh - 4rem); display: block; }
  .sea { fill: url(#seaGradient); }
  
  /* STILI TERRA */
  .land-path { fill: rgba(138, 90, 59, 0.7); stroke: rgba(255,255,255,0.2); stroke-width: 1.5; transition: all 0.4s ease; cursor: pointer; }
  .land-path:hover { fill: rgba(138, 90, 59, 1); stroke: #ffd166; filter: drop-shadow(0 0 15px rgba(255,209,102,0.4)); }
  
  /* ARCIPELAGO SPECIAL (Body + Extensions) */
  .arc-main { fill: rgba(150, 100, 70, 0.8); stroke: rgba(255,217,102,0.5); filter: drop-shadow(0 0 10px rgba(255,217,102,0.2)); }
  .arc-ext { fill: rgba(138, 90, 59, 0.6); stroke: rgba(255,255,255,0.1); pointer-events: none; }
  
  /* UI LABELS */
  .label-group text { fill: white; font-size: 11px; font-weight: 800; text-anchor: middle; pointer-events: none; text-transform: uppercase; letter-spacing: 2px; }
  .label-category { font-size: 8px !important; fill: rgba(255,255,255,0.4) !important; letter-spacing: 3px !important; }
  .label-main { font-size: 16px !important; fill: #ffd166 !important; }
</style>
</head>
<body class="h-screen flex flex-col">

  <nav class="h-16 glass flex items-center px-6 border-b border-white/10 z-50">
    <div class="flex items-center gap-2 text-[10px] font-extrabold tracking-widest text-white/40 uppercase">
      <a href="/mari" class="hover:text-sky-400">MARI</a>
      <span class="text-white/10">/</span>
      <span class="text-sky-400">1 CARTA</span>
    </div>
  </nav>

  <div class="flex-1 relative">
    <svg viewBox="0 0 1400 900" preserveAspectRatio="xMidYMid slice">
      <defs>
        <radialGradient id="seaGradient" cx="50%" cy="45%" r="75%">
          <stop offset="0%" stop-color="#0d4f9f"/><stop offset="100%" stop-color="#000814"/>
        </radialGradient>
      </defs>
      <rect class="sea" width="100%" height="100%" />
      
      <!-- ARCIPELAGO "IL CORPO" (Isola + Estensioni) -->
      <g transform="translate(600, 450)" class="island-group" onclick="goToIsland('Il Corpo un mondo da scoprire', true)">
        <!-- Estensioni (Piccole Isole intorno) -->
        <circle class="arc-ext" cx="-100" cy="-60" r="12" />
        <path class="arc-ext" d="M80,-90 C90,-110 110,-100 100,-80 C90,-70 70,-80 80,-90 Z" />
        <circle class="arc-ext" cx="120" cy="40" r="8" />
        <circle class="arc-ext" cx="-40" cy="110" r="10" />
        <path class="arc-ext" d="M-130,40 C-150,30 -140,10 -120,20 C-100,30 -110,50 -130,40 Z" />
        
        <!-- Corpo Centrale -->
        <path class="land-path arc-main" d="M-70,-15 C-90,-50 -30,-90 40,-80 C110,-70 120,10 90,60 C60,110 -40,100 -80,50 C-100,20 -80,-5 -70,-15 Z" />
        
        <text class="label-main" y="15">IL CORPO</text>
        <text class="label-category" y="-120">Arcipelago</text>
      </g>

      <!-- ISOLA SINGOLA "STANDARD" -->
      <g transform="translate(1000, 300)" class="island-group" onclick="goToIsland('Isola del Farò')">
        <path class="land-path" d="M-40,-40 C10,-70 70,-10 40,40 C10,70 -70,10 -40,-40 Z" />
        <text class="label-main" y="10">FARÒ</text>
        <text class="label-category" y="-60">Isola Singola</text>
      </g>

      <!-- ISOLA SINGOLA "PICCOLA" -->
      <g transform="translate(400, 200)" class="island-group" onclick="goToIsland('Isola Minore')">
        <path class="land-path" d="M-20,-20 C10,-30 30,-10 20,20 C10,30 -30,10 -20,-20 Z" />
        <text y="40" style="fill:white; font-size:10px; font-weight:800; text-anchor:middle;">MINORE</text>
      </g>

    </svg>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    function goToIsland(name, isArcipelago = false) {
      const nextParams = new URLSearchParams(params.toString());
      nextParams.set('isola', name);
      if (isArcipelago) {
        nextParams.set('arcipelago', name);
        window.location.href = `2_brand_arcipelago.html?${nextParams.toString()}`;
      } else {
        window.location.href = `2_brand_isola_regioni.html?${nextParams.toString()}`;
      }
    }
  </script>
</body>
</html>
