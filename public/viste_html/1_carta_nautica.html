<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carta Nautica – Capitan Mark Postura</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --sea-dark: #0a192f;
    --sea-light: #172a45;
    --island-dark: #1b4332;
    --island-light: #2d6a4f;
    --route-color: #ffd166;
    --port-color: #f77f00;
  }

  body { 
    margin: 0; 
    font-family: 'Inter', sans-serif; 
    background: radial-gradient(circle at center, var(--sea-light) 0%, var(--sea-dark) 100%);
    overflow: hidden;
    color: white;
  }
  
  svg { 
    width: 100vw; 
    height: 100vh; 
    display: block; 
  }

  /* MARE */
  .sea { 
    fill: url(#seaGradient); 
  }

  /* GRIGLIA */
  .grid { 
    fill: none; 
    stroke: rgba(255, 255, 255, 0.05); 
    stroke-width: 1; 
    stroke-dasharray: 4 4;
  }

  /* ISOLE */
  .island { 
    fill: url(#islandGradient); 
    stroke: #081c15; 
    stroke-width: 2; 
    transition: all 0.3s ease;
    filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5));
  }
  .island-group:hover .island {
    filter: drop-shadow(0 15px 15px rgba(0,0,0,0.8)) brightness(1.2);
    transform: translateY(-2px);
  }
  .island-group {
    cursor: pointer;
  }

  /* TESTO ISOLE */
  .island-text { 
    font-size: 14px; 
    fill: #fff; 
    font-weight: 800; 
    pointer-events: auto;
    cursor: pointer;
    text-shadow: 0 2px 4px rgba(0,0,0,0.8);
    transition: all 0.3s ease;
  }
  .island-group:hover .island-text {
    font-size: 16px;
  }

  .archipelago-orbit {
    fill: none;
    stroke: rgba(255, 217, 128, 0.56);
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-dasharray: 9 7;
  }

  .archipelago-main,
  .archipelago-small {
    stroke: rgba(255,255,255,0.9);
    stroke-width: 4;
    filter: drop-shadow(0 10px 12px rgba(0,0,0,0.45));
    transition: all 0.25s ease;
  }

  .island-group:hover .archipelago-main,
  .island-group:hover .archipelago-small {
    filter: drop-shadow(0 15px 18px rgba(0,0,0,0.65)) brightness(1.12);
  }

  .archipelago-shoal {
    fill: rgba(255,255,255,0.14);
    stroke: rgba(255,255,255,0.22);
    stroke-width: 1;
    pointer-events: none;
  }

  .archipelago-coast {
    fill: none;
    stroke: rgba(255,255,255,0.36);
    stroke-width: 1.5;
    stroke-dasharray: 6 8;
    pointer-events: none;
  }

  .archipelago-speck {
    fill: #7fbf8f;
    stroke: rgba(255,255,255,0.7);
    stroke-width: 1.4;
    pointer-events: none;
  }

  .archipelago-label {
    fill: #fff;
    font-size: 15px;
    font-weight: 800;
    text-anchor: middle;
    pointer-events: auto;
    cursor: pointer;
    text-shadow: 0 2px 4px rgba(0,0,0,0.9);
  }

  /* PORTI */
  .port { 
    fill: var(--port-color); 
    stroke: #fff; 
    stroke-width: 1.5; 
    cursor: pointer; 
    transition: all 0.3s ease;
  }
  .port:hover {
    fill: #fcbf49;
    r: 7;
    filter: drop-shadow(0 0 8px var(--port-color));
  }
  
  /* PULSAZIONE PORTI */
  .port-pulse {
    fill: none;
    stroke: var(--port-color);
    stroke-width: 2;
    opacity: 0;
    animation: pulse 2s infinite;
    pointer-events: none;
  }
  @keyframes pulse {
    0% { transform: scale(1); opacity: 0.8; }
    100% { transform: scale(3); opacity: 0; }
  }


  /* ROTTE */
  .route { 
    fill: none; 
    stroke: var(--route-color); 
    stroke-width: 2.5; 
    stroke-dasharray: 10 6; 
    animation: dash 30s linear infinite;
    filter: drop-shadow(0 0 4px rgba(255, 209, 102, 0.4));
  }
  @keyframes dash {
    to { stroke-dashoffset: -1000; }
  }

  /* ONDE */
  .wave { 
    fill: none; 
    stroke: rgba(255, 255, 255, 0.15); 
    stroke-width: 1.5; 
    stroke-linecap: round;
    animation: waveMove 10s ease-in-out infinite alternate;
  }
  .wave:nth-child(even) {
    animation-duration: 12s;
    animation-direction: alternate-reverse;
  }
  @keyframes waveMove {
    0% { transform: translateX(-10px); }
    100% { transform: translateX(10px); }
  }

  /* ROSA DEI VENTI */
  .compass-bg { fill: rgba(10, 25, 47, 0.8); stroke: rgba(255,255,255,0.2); stroke-width: 2; backdrop-filter: blur(5px); }
  .compass-line { fill: none; stroke: rgba(255,255,255,0.4); stroke-width: 1; }
  .compass-text { font-size: 12px; fill: #fff; font-weight: 600; text-anchor: middle; dominant-baseline: middle; }
  .compass-pointer { fill: #e63946; }
  
  .compass-group {
    transition: transform 0.5s ease;
    transform-origin: 0px 0px;
  }
  .compass-group:hover {
    transform: scale(1.1) rotate(15deg);
  }

  .title { font-size: 24px; fill: #fff; font-weight: 800; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
  .subtitle { font-size: 14px; fill: rgba(255,255,255,0.7); font-weight: 400; }
  
  .legend-text { font-size: 12px; fill: #fff; font-weight: 600; }

  /* UI SOVRAPPOSTA (HTML anzichè SVG per blur) */
  .glass-panel {
    position: absolute;
    bottom: 30px;
    left: 30px;
    background: rgba(10, 25, 47, 0.6);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.3);
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  
  .legend-item {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 13px;
    font-weight: 600;
  }
  
  .legend-icon {
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  .ui-header {
    position: absolute;
    top: 30px;
    left: 30px;
    background: rgba(10, 25, 47, 0.6);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    padding: 20px 30px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.3);
  }
  .ui-header h1 { margin: 0 0 5px 0; font-size: 22px; }
  .ui-header p { margin: 0; font-size: 14px; color: rgba(255,255,255,0.7); }

  /* TOOLTIP */
  .tooltip {
    position: absolute;
    background: rgba(255, 255, 255, 0.95);
    color: #0a192f;
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    transform: translate(-50%, -100%);
    margin-top: -10px;
    z-index: 100;
  }
</style>
</head>
<body>

<div id="tooltip" class="tooltip"></div>

<div class="ui-header">
  <h1>Carta Nautica</h1>
  <p>Capitan Mark Postura</p>
</div>

<div class="glass-panel">
  <div class="legend-item">
    <div class="legend-icon">
      <svg width="12" height="12"><circle cx="6" cy="6" r="5" fill="#f77f00" stroke="#fff" stroke-width="1.5"/></svg>
    </div>
    <span>Porto Commerciale</span>
  </div>

  <div class="legend-item">
    <div class="legend-icon">
      <svg width="30" height="4"><line x1="0" y1="2" x2="30" y2="2" stroke="#ffd166" stroke-width="2.5" stroke-dasharray="6 4"/></svg>
    </div>
    <span>Rotta di Navigazione</span>
  </div>
</div>

<svg viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="seaGradient" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#172a45"/>
      <stop offset="100%" stop-color="#0a192f"/>
    </radialGradient>
    <linearGradient id="islandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d6a4f"/>
      <stop offset="100%" stop-color="#1b4332"/>
    </linearGradient>
  </defs>

  <!-- MARE -->
  <rect class="sea" width="100%" height="100%"/>

  <!-- GRIGLIA LATITUDINE -->
  <g class="grid-lines">
    <line class="grid" x1="0" y1="100" x2="1000" y2="100"/>
    <line class="grid" x1="0" y1="200" x2="1000" y2="200"/>
    <line class="grid" x1="0" y1="300" x2="1000" y2="300"/>
    <line class="grid" x1="0" y1="400" x2="1000" y2="400"/>
    <line class="grid" x1="0" y1="500" x2="1000" y2="500"/>
    
    <!-- GRIGLIA LONGITUDINE -->
    <line class="grid" x1="100" y1="0" x2="100" y2="600"/>
    <line class="grid" x1="200" y1="0" x2="200" y2="600"/>
    <line class="grid" x1="300" y1="0" x2="300" y2="600"/>
    <line class="grid" x1="400" y1="0" x2="400" y2="600"/>
    <line class="grid" x1="500" y1="0" x2="500" y2="600"/>
    <line class="grid" x1="600" y1="0" x2="600" y2="600"/>
    <line class="grid" x1="700" y1="0" x2="700" y2="600"/>
    <line class="grid" x1="800" y1="0" x2="800" y2="600"/>
    <line class="grid" x1="900" y1="0" x2="900" y2="600"/>
  </g>

  <!-- ONDE MIGLIORATE -->
  <path class="wave" d="M-50,120 Q100,90 250,130 T550,140 T850,120 T1150,140"/>
  <path class="wave" d="M-50,220 Q150,190 350,230 T650,210 T950,240 T1250,220"/>
  <path class="wave" d="M-50,320 Q200,290 450,330 T750,310 T1050,340"/>
  <path class="wave" d="M-50,420 Q120,390 300,430 T600,410 T900,440 T1200,420"/>
  <path class="wave" d="M-50,520 Q220,490 500,530 T800,510 T1100,540"/>

  <!-- LIVELLI DINAMICI (RENDERIZZATI TRAMITE JS) -->
  <g id="dynamic-routes"></g>
  <g id="dynamic-islands"></g>
  <!-- ROSA DEI VENTI MIGLIORATA -->
  <g transform="translate(900,100)">
    <g class="compass-group">
      <circle class="compass-bg" r="60"/>
      <circle class="compass-bg" r="45" style="fill:none; stroke-dasharray: 4 4;"/>
      
      <!-- Punte -->
      <polygon points="0,-40 -10,-10 0,0" class="compass-pointer"/>
      <polygon points="0,-40 10,-10 0,0" fill="#a82a33"/>
      
      <polygon points="0,40 -10,10 0,0" fill="#cbd5e1"/>
      <polygon points="0,40 10,10 0,0" fill="#94a3b8"/>
      
      <polygon points="-40,0 -10,-10 0,0" fill="#cbd5e1"/>
      <polygon points="-40,0 -10,10 0,0" fill="#94a3b8"/>
      
      <polygon points="40,0 10,-10 0,0" fill="#cbd5e1"/>
      <polygon points="40,0 10,10 0,0" fill="#94a3b8"/>

      <text class="compass-text" x="0" y="-50">N</text>
      <text class="compass-text" x="0" y="50">S</text>
      <text class="compass-text" x="-50" y="0">W</text>
      <text class="compass-text" x="50" y="0">E</text>
    </g>
  </g>

</svg>

<script>
  // CONFIGURAZIONE DELLA MAPPA
  const mapData = {
    islands: [
      {
        id: 'inside_adventure',
        name: 'Inside Adventure',
        x: 230,
        y: 230,
        path: 'M-80,20 C-110,-50 -10,-110 70,-80 C110,-30 90,50 30,80 C-30,110 -80,80 -80,20 Z',
        textOffsetX: -54,
        textOffsetY: 0,
        ports: [
          { id: 'inside_adventure_est', name: 'Porto Inside Adventure Est', offsetX: 70, offsetY: -80, delay: 0 },
          { id: 'inside_adventure_sud', name: 'Porto Inside Adventure Sud', offsetX: -80, offsetY: 20, delay: 1 }
        ]
      },
      {
        id: 'posturacorretta',
        name: 'PosturaCorretta',
        x: 530,
        y: 200,
        path: 'M-80,-20 C-110,-80 30,-100 90,-40 C110,40 30,100 -50,80 C-90,60 -100,20 -80,-20 Z',
        textOffsetX: -58,
        textOffsetY: -10,
        ports: [
          { id: 'posturacorretta_ovest', name: 'Porto PosturaCorretta Ovest', offsetX: -80, offsetY: -20, delay: 0.5 },
          { id: 'posturacorretta_est', name: 'Porto PosturaCorretta Est', offsetX: 90, offsetY: -40, delay: 1.5 }
        ]
      },
      {
        id: 'sapienza_visione_intuizione',
        name: 'Sapienza Visione Intuizione',
        labelLines: ['Sapienza Visione', 'Intuizione'],
        x: 750,
        y: 330,
        path: 'M-50,20 C-90,-70 30,-90 90,-10 C70,90 -30,90 -50,20 Z',
        textOffsetX: -58,
        textOffsetY: 2,
        ports: [
          { id: 'sapienza_visione_intuizione_nord', name: 'Porto Sapienza Visione Intuizione Nord', offsetX: -50, offsetY: 20, delay: 0.2 },
          { id: 'sapienza_visione_intuizione_est', name: 'Porto Sapienza Visione Intuizione Est', offsetX: 90, offsetY: -10, delay: 1.2 }
        ]
      },
      {
        id: 'corpo_mondo',
        type: 'archipelago',
        name: 'Il Corpo un mondo da scoprire',
        labelLines: ['Il Corpo', 'un mondo', 'da scoprire'],
        x: 405,
        y: 430,
        portId: 'corpo_mondo_archipelago'
      }
    ],
    routes: [
      { from: 'inside_adventure_est', to: 'posturacorretta_ovest' },
      { from: 'posturacorretta_est', to: 'sapienza_visione_intuizione_nord' },
      { from: 'sapienza_visione_intuizione_est', to: 'corpo_mondo_archipelago' }
    ]
  };

  const islandsContainer = document.getElementById('dynamic-islands');
  const routesContainer = document.getElementById('dynamic-routes');
  const portPositions = {}; // Memorizza le posizioni assolute per disegnare le rotte

  function goToNextStep(isola, porto, type = 'island') {
    const params = new URLSearchParams(window.location.search);
    params.set('isola', isola);
    params.set('porto', porto);
    if (type === 'archipelago') params.set('arcipelago', isola);

    const nextPage = type === 'archipelago'
      ? '2_brand_arcipelago.html'
      : isola === 'PosturaCorretta'
      ? '3_metro.html'
      : '2_brand_isola_regioni.html';

    window.location.href = `${nextPage}?${params.toString()}`;
  }

  function appendMultilineText(parent, lines, x, y, className) {
    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    text.setAttribute('class', className);
    text.setAttribute('x', x);
    text.setAttribute('y', y);

    lines.forEach((line, index) => {
      const tspan = document.createElementNS('http://www.w3.org/2000/svg', 'tspan');
      tspan.setAttribute('x', x);
      tspan.setAttribute('dy', index === 0 ? 0 : 18);
      tspan.textContent = line;
      text.appendChild(tspan);
    });

    parent.appendChild(text);
    return text;
  }

  function renderArchipelago(group, island) {
    portPositions[island.portId] = { x: island.x, y: island.y };

    const links = [
      { x1: 0, y1: 0, x2: -88, y2: 72 },
      { x1: 0, y1: 0, x2: -18, y2: -105 },
      { x1: 0, y1: 0, x2: 94, y2: -34 },
      { x1: 0, y1: 0, x2: 112, y2: 62 }
    ];

    links.forEach(link => {
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('class', 'archipelago-orbit');
      line.setAttribute('x1', link.x1);
      line.setAttribute('y1', link.y1);
      line.setAttribute('x2', link.x2);
      line.setAttribute('y2', link.y2);
      group.appendChild(line);
    });

    const smallIslands = [
      {
        x: -88,
        y: 72,
        scale: 0.45,
        fill: '#7c3aed',
        coast: 'M-93,-8 C-80,-78 10,-95 80,-46 C112,4 85,74 17,92 C-54,111 -111,58 -93,-8 Z',
        shape: 'M-76,-6 C-65,-60 9,-76 62,-38 C86,0 66,58 13,73 C-43,88 -91,46 -76,-6 Z'
      },
      {
        x: -18,
        y: -105,
        scale: 0.5,
        fill: '#2563eb',
        coast: 'M-105,8 C-120,-55 -62,-106 5,-98 C78,-90 121,-35 105,30 C88,98 5,124 -66,92 C-112,70 -95,35 -105,8 Z',
        shape: 'M-92,8 C-105,-48 -52,-92 5,-86 C62,-80 101,-31 91,24 C81,80 0,102 -57,78 C-94,62 -82,29 -92,8 Z'
      },
      {
        x: 94,
        y: -34,
        scale: 0.34,
        fill: '#ef4444',
        coast: 'M-75,-6 C-67,-62 8,-83 58,-45 C93,-6 68,62 7,74 C-57,86 -86,43 -75,-6 Z',
        shape: 'M-58,-5 C-52,-48 7,-63 45,-34 C70,-5 51,47 5,56 C-44,65 -66,32 -58,-5 Z'
      },
      {
        x: 112,
        y: 62,
        scale: 0.37,
        fill: '#f59e0b',
        coast: 'M-70,4 C-80,-46 -22,-82 36,-64 C92,-47 91,23 47,59 C-6,101 -63,65 -70,4 Z',
        shape: 'M-54,3 C-62,-35 -17,-62 28,-49 C70,-36 69,17 36,45 C-5,77 -49,50 -54,3 Z'
      }
    ];

    smallIslands.forEach(item => {
      const shoal = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      shoal.setAttribute('class', 'archipelago-shoal');
      shoal.setAttribute('d', item.coast);
      shoal.setAttribute('transform', `translate(${item.x}, ${item.y}) scale(${item.scale})`);
      group.appendChild(shoal);

      const coast = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      coast.setAttribute('class', 'archipelago-coast');
      coast.setAttribute('d', item.coast);
      coast.setAttribute('transform', `translate(${item.x}, ${item.y}) scale(${item.scale * 1.13})`);
      group.appendChild(coast);

      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('class', 'archipelago-small');
      path.setAttribute('d', item.shape);
      path.setAttribute('fill', item.fill);
      path.setAttribute('transform', `translate(${item.x}, ${item.y}) scale(${item.scale})`);
      group.appendChild(path);
    });

    const mainCoast = 'M-105,8 C-120,-55 -62,-106 5,-98 C78,-90 121,-35 105,30 C88,98 5,124 -66,92 C-112,70 -95,35 -105,8 Z';
    const mainShape = 'M-92,8 C-105,-48 -52,-92 5,-86 C62,-80 101,-31 91,24 C81,80 0,102 -57,78 C-94,62 -82,29 -92,8 Z';

    const mainShoal = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    mainShoal.setAttribute('class', 'archipelago-shoal');
    mainShoal.setAttribute('d', mainCoast);
    mainShoal.setAttribute('transform', 'scale(0.68)');
    group.appendChild(mainShoal);

    const mainCoastPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    mainCoastPath.setAttribute('class', 'archipelago-coast');
    mainCoastPath.setAttribute('d', mainCoast);
    mainCoastPath.setAttribute('transform', 'scale(0.78)');
    group.appendChild(mainCoastPath);

    const main = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    main.setAttribute('class', 'archipelago-main');
    main.setAttribute('d', mainShape);
    main.setAttribute('fill', '#3b82f6');
    main.setAttribute('transform', 'scale(0.62)');
    group.appendChild(main);

    [
      { x: -82, y: 50, r: 5 },
      { x: 72, y: -66, r: 4 },
      { x: 98, y: 45, r: 4 }
    ].forEach(item => {
      const speck = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      speck.setAttribute('class', 'archipelago-speck');
      speck.setAttribute('cx', item.x);
      speck.setAttribute('cy', item.y);
      speck.setAttribute('r', item.r);
      group.appendChild(speck);
    });

    appendMultilineText(group, island.labelLines, 0, -18, 'archipelago-label');
  }

  // RENDER ISOLE E PORTI
  mapData.islands.forEach(island => {
    // Genera il gruppo dell'isola
    const islandGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    islandGroup.setAttribute('class', 'island-group');
    islandGroup.setAttribute('transform', `translate(${island.x}, ${island.y})`);
    islandGroup.setAttribute('data-isola', island.name);
    islandGroup.setAttribute('data-type', island.type || 'island');
    islandGroup.setAttribute('data-port', island.type === 'archipelago' ? island.portId : island.ports[0].id);
    islandGroup.addEventListener('click', (e) => {
      e.stopPropagation();
      goToNextStep(
        island.name,
        island.type === 'archipelago' ? island.portId : island.ports[0].id,
        island.type || 'island'
      );
    });

    if (island.type === 'archipelago') {
      renderArchipelago(islandGroup, island);
      islandsContainer.appendChild(islandGroup);
      return;
    }

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('class', 'island');
    path.setAttribute('d', island.path);

    islandGroup.appendChild(path);
    appendMultilineText(islandGroup, island.labelLines || [island.name], island.textOffsetX, island.textOffsetY, 'island-text');

    // Genera i porti per l'isola
    island.ports.forEach(port => {
      // Salva la posizione assoluta per le rotte
      portPositions[port.id] = { x: island.x + port.offsetX, y: island.y + port.offsetY };

      const portGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      portGroup.setAttribute('class', 'interactive-element');
      portGroup.setAttribute('data-name', port.name);
      portGroup.setAttribute('data-isola', island.name);
      portGroup.setAttribute('data-port', port.id);
      portGroup.addEventListener('click', (e) => {
        e.stopPropagation();
        goToNextStep(island.name, port.id);
      });

      const pulse = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      pulse.setAttribute('class', 'port-pulse');
      pulse.setAttribute('cx', port.offsetX);
      pulse.setAttribute('cy', port.offsetY);
      pulse.setAttribute('r', '5');
      pulse.setAttribute('style', `transform-origin: ${port.offsetX}px ${port.offsetY}px; animation-delay: ${port.delay}s;`);

      const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      circle.setAttribute('class', 'port');
      circle.setAttribute('cx', port.offsetX);
      circle.setAttribute('cy', port.offsetY);
      circle.setAttribute('r', '5');

      portGroup.appendChild(pulse);
      portGroup.appendChild(circle);
      islandGroup.appendChild(portGroup);
    });

    islandsContainer.appendChild(islandGroup);
  });

  // RENDER ROTTE
  mapData.routes.forEach(route => {
    const fromPos = portPositions[route.from];
    const toPos = portPositions[route.to];

    if (fromPos && toPos) {
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('class', 'route');
      line.setAttribute('x1', fromPos.x);
      line.setAttribute('y1', fromPos.y);
      line.setAttribute('x2', toPos.x);
      line.setAttribute('y2', toPos.y);
      routesContainer.appendChild(line);
    }
  });

  // TOOLTIP LOGIC
  const tooltip = document.getElementById('tooltip');
  const svgCanvas = document.querySelector('svg');
  
  svgCanvas.addEventListener('mouseover', (e) => {
    const target = e.target.closest('.interactive-element');
    if (target) {
      const name = target.getAttribute('data-name');
      if (name) {
        tooltip.textContent = name;
        tooltip.style.opacity = '1';
      }
    }
  });

  svgCanvas.addEventListener('mousemove', (e) => {
    const target = e.target.closest('.interactive-element');
    if (target) {
      tooltip.style.left = e.pageX + 'px';
      tooltip.style.top = e.pageY + 'px';
    }
  });

  svgCanvas.addEventListener('mouseout', (e) => {
    const target = e.target.closest('.interactive-element');
    if (target) {
      tooltip.style.opacity = '0';
    }
  });

  svgCanvas.addEventListener('click', (e) => {
    const target = e.target.closest('.interactive-element') || e.target.closest('.island-group');
    if (!target) return;

    goToNextStep(target.getAttribute('data-isola'), target.getAttribute('data-port'), target.getAttribute('data-type') || 'island');
  });
</script>

</body>
</html>
