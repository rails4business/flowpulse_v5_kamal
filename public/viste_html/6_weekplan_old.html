<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weekly Plan</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      background: white;
      color: #0f172a;
    }

    .planner {
      height: 100vh;
      display: grid;
      grid-template-columns: 38px 1fr;
      gap: 6px;
      padding: 6px;
      box-sizing: border-box;
    }

    .hours {
      display: grid;
      grid-template-rows: 14px repeat(26, minmax(0, 1fr));
      height: 100%;
      font-size: 7px;
      font-weight: 800;
      color: #cbd5e1;
      text-align: right;
      padding-right: 4px;
      box-sizing: border-box;
    }

    .days-grid {
      height: 100%;
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 6px;
    }

    .day {
      height: 100%;
      min-height: 0;
      display: grid;
      grid-template-rows: 14px minmax(0, 1fr);
    }

    .day-title {
      font-size: 9px;
      line-height: 14px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      text-align: center;
      color: #475569;
    }

    .time-grid {
      display: grid;
      grid-template-rows: repeat(26, minmax(0, 1fr));
      height: 100%;
      min-height: 0;
      position: relative;
      border-radius: 12px;
      background: #f8fafc;
      border: 1px solid #f1f5f9;
      padding: 3px;
      box-sizing: border-box;
    }

    .event {
      min-height: 0;
      overflow: hidden;
      border-radius: 8px;
      padding: 3px 4px;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.06);
      line-height: 1.05;
    }

    .event-title {
      font-size: 7px;
      line-height: 1.05;
      font-weight: 900;
      text-transform: uppercase;
    }

    .event-text {
      font-size: 6px;
      line-height: 1.1;
      font-weight: 800;
    }
  </style>
</head>

<body>
  <script id="weekplan-data" type="application/json">
  {
    "time_range": {
      "start": "08:00",
      "end": "21:00",
      "step_minutes": 30
    },
    "days": ["lun", "mar", "mer", "gio", "ven", "sab", "dom"],
    "slots": [
      {
        "day": "lun",
        "type": "rails4business",
        "title": "RAILS 4B",
        "start": "09:00",
        "end": "20:00",
        "details": ["Coding", "FlowPulse"]
      },
      
      {
        "day": "mar",
        "type": "posturacorretta",
        "title": "PosturaCorretta",
        "start": "17:00",
        "end": "20:00",
        "details": ["Individuali", "Viadana / Calvisano"]
      },
    
      {
        "day": "mer",
        "type": "posturacorretta",
        "title": "PosturaCorretta",
        "start": "17:00",
        "end": "20:00",
        "details": ["Viadana / Calvisano", "Con conferma"]
      },

      {
        "day": "gio",
        "type": "appointments",
        "title": "Lezione",
        "start": "11:00",
        "end": "12:00",
        "details": ["Fisarmonica"]
      },
 

      {
        "day": "gio",
        "type": "posturacorretta",
        "title": "PosturaCorretta",
        "start": "17:00",
        "end": "20:00",
        "details": ["Individuali", "Viadana / Calvisano"]
      },
      {
        "day": "ven",
        "type": "appointments",
        "title": "Pittura",
        "start": "10:00",
        "end": "12:00"
      },
    
      {
        "day": "ven",
        "type": "posturacorretta",
        "title": "PosturaCorretta",
        "start": "17:00",
        "end": "20:00",
        "details": ["Viadana / Calvisano"]
      },
      {
        "day": "sab",
        "type": "events",
        "title": "Eventi",
        "start": "09:00",
        "end": "12:00"
      },
      {
        "day": "dom",
        "type": "events",
        "title": "Eventi",
        "start": "09:00",
        "end": "12:00"
      }
    ]
  }
  </script>

  <div class="planner">
    <div class="hours" id="hours"></div>
    <div class="days-grid" id="days-grid"></div>
  </div>

  <script>
    const data = JSON.parse(document.getElementById("weekplan-data").textContent)

    const colors = {
      appointments: "bg-rose-100 border-rose-300 text-rose-900",
      posturacorretta: "bg-blue-100 border-blue-300 text-blue-900",
      rails4business: "bg-amber-100 border-amber-300 text-amber-900",
      events: "bg-violet-100 border-violet-300 text-violet-900"

    }

    function minutesFromTime(time) {
      const [h, m] = time.split(":").map(Number)
      return h * 60 + m
    }

    function timeToRow(time) {
      const startMinutes = minutesFromTime(data.time_range.start)
      const currentMinutes = minutesFromTime(time)
      return Math.floor((currentMinutes - startMinutes) / data.time_range.step_minutes) + 1
    }

    function spanRows(start, end) {
      const diff = minutesFromTime(end) - minutesFromTime(start)
      return Math.max(1, diff / data.time_range.step_minutes)
    }

    function renderHours() {
      const hours = document.getElementById("hours")
      const start = minutesFromTime(data.time_range.start)
      const end = minutesFromTime(data.time_range.end)
      const step = data.time_range.step_minutes

      hours.innerHTML = "<div></div>"

      for (let min = start; min < end; min += step) {
        const h = String(Math.floor(min / 60)).padStart(2, "0")
        const m = String(min % 60).padStart(2, "0")
        hours.innerHTML += m === "00" ? `<div>${h}:${m}</div>` : "<div></div>"
      }
    }

    function renderWeekPlan() {
      const grid = document.getElementById("days-grid")
      grid.innerHTML = ""

      data.days.forEach(day => {
        const daySlots = data.slots.filter(slot => slot.day === day)

        const dayEl = document.createElement("div")
        dayEl.className = "day"

        dayEl.innerHTML = `
          <div class="day-title">${day}</div>
          <div class="time-grid"></div>
        `

        const timeGrid = dayEl.querySelector(".time-grid")

        daySlots.forEach(slot => {
          const eventEl = document.createElement("div")
          eventEl.className = `event border ${colors[slot.type] || colors.projects}`

          eventEl.style.gridRowStart = timeToRow(slot.start)
          eventEl.style.gridRowEnd = `span ${spanRows(slot.start, slot.end)}`

          eventEl.innerHTML = `
            <div class="event-title">${slot.title}</div>
            <div class="event-text">${slot.start} - ${slot.end}</div>
            ${(slot.details || []).map(detail => `<div class="event-text">${detail}</div>`).join("")}
          `

          timeGrid.appendChild(eventEl)
        })

        grid.appendChild(dayEl)
      })
    }

    renderHours()
    renderWeekPlan()
  </script>
</body>

</html>
