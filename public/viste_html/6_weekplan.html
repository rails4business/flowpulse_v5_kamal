    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      background: white;
      color: #0f172a;
    }

    .planner {
      height: 100vh;
      display: grid;
      grid-template-columns: 38px 1fr;
      gap: 6px;
      padding: 6px;
      box-sizing: border-box;
    }

    .hours {
      display: grid;
      grid-template-rows: 14px repeat(26, minmax(0, 1fr));
      height: 100%;
      font-size: 7px;
      font-weight: 800;
      color: #cbd5e1;
      text-align: right;
      padding-right: 4px;
      box-sizing: border-box;
    }

    .days-grid {
      height: 100%;
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 6px;
    }

    .day {
      height: 100%;
      min-height: 0;
      display: grid;
      grid-template-rows: 14px minmax(0, 1fr);
    }

    .day-title {
      font-size: 9px;
      line-height: 14px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      text-align: center;
      color: #475569;
    }

    .time-grid {
      display: grid;
      grid-template-rows: repeat(26, minmax(0, 1fr));
      height: 100%;
      min-height: 0;
      border-radius: 12px;
      background: #f8fafc;
      border: 1px solid #f1f5f9;
      padding: 3px;
      box-sizing: border-box;
    }

    .event-date {
      min-height: 0;
      overflow: hidden;
      border-radius: 8px;
      padding: 4px;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.06);
      line-height: 1.05;
    }

    .event-title {
      font-size: 7px;
      line-height: 1.05;
      font-weight: 900;
      text-transform: uppercase;
    }

    .event-text {
      font-size: 6px;
      line-height: 1.1;
      font-weight: 800;
    }

    .activity {
      margin-top: 3px;
      padding-top: 3px;
      border-top: 1px solid rgba(15, 23, 42, 0.12);
    }

    .activity-title {
      font-size: 6px;
      line-height: 1.05;
      font-weight: 900;
      text-transform: uppercase;
    }

    .appointment {
      font-size: 5.5px;
      line-height: 1.05;
      font-weight: 800;
      opacity: 0.85;
    }
  </style>
</head>

  <div class="planner">
    <div class="hours" id="hours"></div>
    <div class="days-grid" id="days-grid"></div>
  </div>

  <script>
    const data = JSON.parse(document.getElementById("weekplan-data").textContent)

    const colors = {
      appointments: "bg-rose-100 border-rose-300 text-rose-900",
      posturacorretta: "bg-blue-100 border-blue-300 text-blue-900",
      rails4business: "bg-amber-100 border-amber-300 text-amber-900",
      events: "bg-violet-100 border-violet-300 text-violet-900"
    }

    function minutesFromTime(time) {
      const [h, m] = time.split(":").map(Number)
      return h * 60 + m
    }

    function timeToRow(time) {
      const startMinutes = minutesFromTime(data.time_range.start)
      const currentMinutes = minutesFromTime(time)
      return Math.floor((currentMinutes - startMinutes) / data.time_range.step_minutes) + 1
    }

    function spanRows(start, end) {
      const diff = minutesFromTime(end) - minutesFromTime(start)
      return Math.max(1, diff / data.time_range.step_minutes)
    }

    function renderHours() {
      const hours = document.getElementById("hours")
      const start = minutesFromTime(data.time_range.start)
      const end = minutesFromTime(data.time_range.end)
      const step = data.time_range.step_minutes

      hours.innerHTML = "<div></div>"

      for (let min = start; min < end; min += step) {
        const h = String(Math.floor(min / 60)).padStart(2, "0")
        const m = String(min % 60).padStart(2, "0")
        hours.innerHTML += m === "00" ? `<div>${h}:${m}</div>` : "<div></div>"
      }
    }

    function renderWeekPlan() {
      const grid = document.getElementById("days-grid")
      grid.innerHTML = ""

      data.days.forEach(day => {
        const eventDates = data.event_dates.filter(eventDate => eventDate.day === day)

        const dayEl = document.createElement("div")
        dayEl.className = "day"

        dayEl.innerHTML = `
          <div class="day-title">${day}</div>
          <div class="time-grid"></div>
        `

        const timeGrid = dayEl.querySelector(".time-grid")

        eventDates.forEach(eventDate => {
          const eventEl = document.createElement("div")
          eventEl.className = `event-date border ${colors[eventDate.type] || colors.appointments}`

          eventEl.style.gridRowStart = timeToRow(eventDate.start)
          eventEl.style.gridRowEnd = `span ${spanRows(eventDate.start, eventDate.end)}`

          const activitiesHtml = (eventDate.activities || []).map(activity => {
            const appointmentsHtml = (activity.appointments || []).map(appointment => {
              return `
                <div class="appointment">
                  ${appointment.contact} · ${appointment.role}
                </div>
              `
            }).join("")

            return `
              <div class="activity">
                <div class="activity-title">${activity.title}</div>
                ${appointmentsHtml}
              </div>
            `
          }).join("")

          eventEl.innerHTML = `
            <div class="event-title">${eventDate.title}</div>
            <div class="event-text">${eventDate.start} - ${eventDate.end}</div>
            ${eventDate.location ? `<div class="event-text">${eventDate.location}</div>` : ""}
            ${eventDate.status ? `<div class="event-text">${eventDate.status}</div>` : ""}
            ${activitiesHtml}
          `

          timeGrid.appendChild(eventEl)
        })

        grid.appendChild(dayEl)
      })
    }

    renderHours()
    renderWeekPlan()
  </script>
