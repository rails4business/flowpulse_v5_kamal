<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Arcipelago del Brand - Flowpulse</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --sea-dark: #0d4f9f;
    --sea-light: #1a7fbf;
    --land-base: #8a5a3b;
    --land-border: rgba(255,255,255,0.15);
    --accent: #ffd166;
    --glass-bg: rgba(15, 28, 46, 0.7);
  }

  body { margin: 0; background: #000; font-family: 'Inter', sans-serif; color: white; overflow: hidden; }
  svg { width: 100vw; height: 100vh; display: block; }
  .sea { fill: url(#seaGradient); }

  .route {
    stroke: rgba(255, 217, 128, 0.3); stroke-width: 2.5; stroke-dasharray: 8 6;
    animation: dash 40s linear infinite;
  }
  @keyframes dash { to { stroke-dashoffset: -1000; } }

  /* FIX VIBRAZIONE: L'hover è gestito sul gruppo, non sul path per evitare flicker */
  .island-group { cursor: pointer; pointer-events: all; }
  .island { stroke: var(--land-border); stroke-width: 2; transition: all 0.3s ease; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5)); }
  .island-group:hover .island { filter: brightness(1.3) drop-shadow(0 15px 25px rgba(0,0,0,0.8)); transform: scale(1.03); }

  .coastline { fill: none; stroke: rgba(255,255,255,0.2); stroke-width: 1.5; stroke-dasharray: 5 8; pointer-events: none; }
  .shoal { fill: rgba(255, 255, 255, 0.1); pointer-events: none; }
  .speck { fill: #7fbf8f; stroke: rgba(255,255,255,0.5); stroke-width: 1; pointer-events: none; }

  text { fill: white; font-weight: 800; text-anchor: middle; pointer-events: none; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
  .label-main { font-size: 26px; }
  .label-small { font-size: 14px; }

  .ui-header {
    position: absolute; top: 40px; left: 40px; background: var(--glass-bg); backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 25px 35px; box-shadow: 0 15px 45px rgba(0,0,0,0.5); z-index: 100;
  }

  .nautical-breadcrumb {
    display: flex; align-items: center; gap: 12px; margin-bottom: 15px; font-size: 9px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.4);
  }
  .breadcrumb-node { display: flex; align-items: center; gap: 6px; text-decoration: none; color: inherit; }
  .node-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; box-shadow: 0 0 8px currentColor; }
  .node-line { width: 15px; height: 1px; background: rgba(255,255,255,0.15); }
  .breadcrumb-node.active { color: var(--accent); }
  .ui-header h1 { margin: 0; font-size: 28px; font-weight: 800; background: linear-gradient(90deg, #fff, #a0b2c6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
</style>
</head>
<body>
<div class="ui-header">
  <div class="nautical-breadcrumb">
    <a href="/mari" class="breadcrumb-node"><div class="node-dot"></div><span>0 Mari</span></a>
    <div class="node-line"></div>
    <a href="1_carta_nautica.html" class="breadcrumb-node"><div class="node-dot"></div><span>1 Carta</span></a>
    <div class="node-line"></div>
    <div class="breadcrumb-node active"><div class="node-dot"></div><span>2 Arcipelago</span></div>
  </div>
  <h1 id="arc-title">Arcipelago</h1>
  <p>Scegli una destinazione nel gruppo di isole</p>
</div>

<svg viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="seaGradient" cx="50%" cy="45%" r="75%">
      <stop offset="0%" stop-color="var(--sea-light)"/><stop offset="100%" stop-color="var(--sea-dark)"/>
    </radialGradient>
  </defs>
  <rect class="sea" width="100%" height="100%" />
  <g id="routes"></g>
  <g id="islands"></g>
</svg>

<script>
const params = new URLSearchParams(window.location.search);
const arcName = params.get('arcipelago') || 'Il Corpo un mondo da scoprire';
document.getElementById('arc-title').textContent = arcName;

const islands = [
  { id: 'fisiologia', name: 'Postura e Fisiologia', label: ['Postura e', 'Fisiologia'], x: 500, y: 285, scale: 1.1, color: '#1a7fbf', main: true, coast: 'M-105,8 C-120,-55 -62,-106 5,-98 C78,-90 121,-35 105,30 C88,98 5,124 -66,92 C-112,70 -95,35 -105,8 Z', shape: 'M-92,8 C-105,-48 -52,-92 5,-86 C62,-80 101,-31 91,24 C81,80 0,102 -57,78 C-94,62 -82,29 -92,8 Z' },
  { id: 'stile', name: 'Stile di vita', label: ['Stile di vita'], x: 260, y: 360, scale: 0.8, color: '#2a9d8f', coast: 'M-93,-8 C-80,-78 10,-95 80,-46 C112,4 85,74 17,92 C-54,111 -111,58 -93,-8 Z', shape: 'M-76,-6 C-65,-60 9,-76 62,-38 C86,0 66,58 13,73 C-43,88 -91,46 -76,-6 Z' },
  { id: 'salute', name: 'Percorso Salute', label: ['Percorso', 'Salute'], x: 510, y: 445, scale: 0.8, color: '#3b82c4', coast: 'M-86,0 C-94,-66 -16,-100 52,-65 C107,-36 99,42 46,82 C-18,128 -91,74 -86,0 Z', shape: 'M-70,0 C-76,-52 -12,-80 42,-53 C86,-28 79,33 37,65 C-14,100 -73,58 -70,0 Z' },
  { id: 'patologia', name: 'Cura Patologia', label: ['Cura', 'Patologia'], x: 715, y: 250, scale: 0.6, color: '#e76f51', coast: 'M-75,-6 C-67,-62 8,-83 58,-45 C93,-6 68,62 7,74 C-57,86 -86,43 -75,-6 Z', shape: 'M-58,-5 C-52,-48 7,-63 45,-34 C70,-5 51,47 5,56 C-44,65 -66,32 -58,-5 Z' }
];

const mainIsland = islands.find(i => i.main);
const routes = document.getElementById('routes');
const islandsContainer = document.getElementById('islands');

islands.forEach(island => {
  if (!island.main) {
    const r = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    r.setAttribute('class', 'route'); r.setAttribute('x1', mainIsland.x); r.setAttribute('y1', mainIsland.y);
    r.setAttribute('x2', island.x); r.setAttribute('y2', island.y);
    routes.appendChild(r);
  }

  const group = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  group.setAttribute('class', 'island-group');
  group.setAttribute('transform', `translate(${island.x}, ${island.y})`);
  group.onclick = () => {
    const nextParams = new URLSearchParams(window.location.search);
    nextParams.set('isola', island.name);
    nextParams.set('arcipelago', arcName);
    window.location.href = `2_brand_isola_regioni.html?${nextParams.toString()}`;
  };

  const shoal = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  shoal.setAttribute('class', 'shoal'); shoal.setAttribute('d', island.coast); shoal.setAttribute('transform', `scale(${island.scale})`); group.appendChild(shoal);

  const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  path.setAttribute('class', 'island'); path.setAttribute('d', island.shape); path.setAttribute('fill', island.color); path.setAttribute('transform', `scale(${island.scale})`); group.appendChild(path);

  const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  text.setAttribute('class', island.main ? 'label-main' : 'label-small'); text.setAttribute('y', island.main ? 10 : 5);
  island.label.forEach((line, idx) => {
    const ts = document.createElementNS('http://www.w3.org/2000/svg', 'tspan');
    ts.setAttribute('x', 0); ts.setAttribute('dy', idx === 0 ? 0 : 25); ts.textContent = line; text.appendChild(ts);
  });
  group.appendChild(text);
  islandsContainer.appendChild(group);
});
</script>
</body>
</html>
